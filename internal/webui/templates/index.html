<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{{.Title}}</title>
  <style>
    :root {
      color-scheme: light;
      --canvas: #eef1f3;
      --surface: #ffffff;
      --surface-soft: #f6f8f9;
      --surface-raised: #fbfcfc;
      --ink: #182127;
      --ink-soft: #46545d;
      --muted: #718089;
      --line: #d6dde1;
      --line-strong: #b9c4ca;
      --teal: #167067;
      --teal-soft: #e2f2ef;
      --blue: #2e6387;
      --blue-soft: #e7f0f6;
      --amber: #9a6714;
      --amber-soft: #fff2d9;
      --red: #b43d36;
      --red-soft: #fce9e7;
      --graphite: #202a30;
      --terminal: #151d21;
      --terminal-ink: #d7e9e4;
      --shadow: 0 8px 24px rgba(24, 33, 39, .07);
      --radius: 6px;
    }

    * { box-sizing: border-box; }
    html {
      min-width: 320px;
      height: 100%;
      background: var(--canvas);
    }
    body {
      margin: 0;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: var(--ink);
      background: var(--canvas);
      font: 14px/1.5 "Segoe UI", "Microsoft YaHei UI", system-ui, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; letter-spacing: 0; }
    button, a { -webkit-tap-highlight-color: transparent; }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible {
      outline: 3px solid rgba(46, 99, 135, .24);
      outline-offset: 2px;
    }
    button {
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 7px 12px;
      background: var(--teal);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { filter: brightness(.96); }
    button:disabled { opacity: .46; cursor: not-allowed; }
    button.secondary, .download.secondary { border-color: var(--line-strong); background: #fff; color: var(--ink); }
    button.quiet { border-color: transparent; background: transparent; color: var(--ink-soft); }
    button.danger { background: var(--red); color: #fff; }
    input, select, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
    }
    textarea { min-height: 82px; resize: vertical; }
    input:disabled, select:disabled, textarea:disabled { background: #edf1f3; color: var(--muted); cursor: not-allowed; }

    .app-header {
      position: relative;
      z-index: 30;
      flex: 0 0 auto;
      border-bottom: 1px solid #344149;
      background: var(--graphite);
      color: #f5f8f9;
    }
    .header-inner {
      width: min(1500px, 100%);
      min-height: 62px;
      margin: 0 auto;
      padding: 0 18px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 24px;
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 220px; }
    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid #56656d;
      border-radius: 5px;
      color: #9fe0d5;
      font: 800 13px/1 "Cascadia Mono", Consolas, monospace;
    }
    .brand-name {
      font-family: Bahnschrift, "Segoe UI", sans-serif;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.05;
    }
    .brand-sub { margin-top: 2px; color: #aab6bc; font-size: 11px; }
    .primary-nav { display: flex; align-self: stretch; justify-content: center; gap: 3px; }
    .nav-button {
      min-width: 92px;
      height: 100%;
      border: 0;
      border-radius: 0;
      border-bottom: 3px solid transparent;
      background: transparent;
      color: #bac5ca;
      font-weight: 650;
    }
    .nav-button.active { border-bottom-color: #73cabe; color: #fff; background: #263239; }
    .header-state { display: flex; align-items: center; gap: 8px; color: #c2ccd1; font-size: 12px; }
    .state-dot { width: 8px; height: 8px; border-radius: 50%; background: #85939a; }
    .state-dot.running { background: #55c4a5; box-shadow: 0 0 0 4px rgba(85, 196, 165, .15); }
    .state-dot.error { background: #ef746a; box-shadow: 0 0 0 4px rgba(239, 116, 106, .14); }

    .shell {
      width: min(1500px, 100%);
      flex: 1 1 auto;
      min-height: 0;
      margin: 0 auto;
      padding: 12px 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }
    .run-dock {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: minmax(280px, .9fr) minmax(430px, 1.45fr) minmax(340px, .95fr);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .run-identity, .run-metrics, .run-controls { min-width: 0; padding: 14px 16px; }
    .run-identity, .run-metrics { border-right: 1px solid var(--line); }
    .run-identity { display: grid; align-content: center; gap: 7px; }
    .section-label {
      color: var(--muted);
      font: 700 11px/1.2 "Cascadia Mono", Consolas, monospace;
      text-transform: uppercase;
    }
    .run-line { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .status-badge {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 4px 10px;
      background: var(--surface-soft);
      color: var(--ink-soft);
      font-weight: 750;
    }
    .status-badge.running { border-color: #9dd1c5; background: var(--teal-soft); color: var(--teal); }
    .status-badge.error { border-color: #e9afa9; background: var(--red-soft); color: var(--red); }
    .run-id { overflow: hidden; color: var(--ink-soft); font: 12px/1.4 "Cascadia Mono", Consolas, monospace; text-overflow: ellipsis; white-space: nowrap; }
    .phase { margin: 0; color: var(--ink-soft); overflow-wrap: anywhere; }
    .progress-track { height: 5px; overflow: hidden; border-radius: 3px; background: #dfe5e8; }
    .progress-fill { width: 0; height: 100%; background: var(--teal); transition: width .25s ease; }
    .run-metrics { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); align-items: center; }
    .metric { min-width: 0; padding: 0 12px; border-right: 1px solid var(--line); }
    .metric:first-child { padding-left: 0; }
    .metric:last-child { padding-right: 0; border-right: 0; }
    .metric-value { display: block; font-family: Bahnschrift, "Segoe UI", sans-serif; font-size: 25px; font-weight: 700; line-height: 1; }
    .metric-label { display: block; margin-top: 5px; color: var(--muted); font-size: 11px; }
    .run-controls { display: grid; grid-template-columns: minmax(84px, 1fr) minmax(84px, 1fr) auto auto; align-items: end; gap: 8px; }
    .compact-field { display: grid; gap: 4px; color: var(--muted); font-size: 11px; font-weight: 650; }
    .run-message { grid-column: 1 / -1; min-height: 18px; color: var(--ink-soft); font-size: 12px; overflow-wrap: anywhere; }
    .run-message.error { color: var(--red); }

    .view {
      display: none;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }
    .view.active { display: flex; flex-direction: column; }
    .overview-grid {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.65fr) minmax(320px, .75fr);
      gap: 12px;
      align-items: stretch;
    }
    .side-stack {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }
    .panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .overview-grid > .panel { min-height: 0; height: 100%; }
    .panel-head {
      flex: 0 0 auto;
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-raised);
    }
    .panel-title { margin: 0; font: 700 15px/1.2 Bahnschrift, "Segoe UI", sans-serif; }
    .panel-meta { min-width: 0; overflow: hidden; color: var(--muted); font: 11px/1.4 "Cascadia Mono", Consolas, monospace; text-overflow: ellipsis; white-space: nowrap; }
    .terminal {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--terminal);
    }
    pre {
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
      margin: 0;
      overflow: auto;
      padding: 15px;
      color: var(--terminal-ink);
      font: 12px/1.62 "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .pipeline {
      flex: 0 0 auto;
      padding: 4px 14px 8px;
      overflow: auto;
    }
    .stage {
      position: relative;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      min-height: 48px;
    }
    .stage:not(:last-child)::after { content: ""; position: absolute; left: 13px; top: 34px; bottom: -14px; width: 2px; background: var(--line); }
    .stage-node {
      position: relative;
      z-index: 1;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 2px solid var(--line-strong);
      border-radius: 50%;
      background: #fff;
      color: var(--muted);
      font: 700 10px/1 "Cascadia Mono", Consolas, monospace;
    }
    .stage.active .stage-node { border-color: var(--teal); background: var(--teal-soft); color: var(--teal); }
    .stage.skipped .stage-node { border-style: dashed; background: var(--surface-soft); }
    .stage-copy b { display: block; font-size: 13px; }
    .stage-copy span { display: block; margin-top: 1px; color: var(--muted); font-size: 11px; }
    .stage-state { color: var(--muted); font-size: 11px; font-weight: 700; }
    .stage.active .stage-state { color: var(--teal); }
    .stage.skipped .stage-state { color: var(--amber); }
    .recent-list, .run-list {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      align-content: start;
      overflow: auto;
    }
    .recent-list .run-card { border-bottom: 1px solid var(--line); }
    .recent-list .run-card:last-child { border-bottom: 0; }
    .run-card {
      width: 100%;
      min-height: 72px;
      display: grid;
      gap: 7px;
      border: 0;
      border-radius: 0;
      background: #fff;
      color: var(--ink);
      padding: 11px 13px;
      text-align: left;
    }
    .run-card:hover { background: var(--surface-soft); }
    .run-card.active { box-shadow: inset 3px 0 0 var(--teal); background: var(--teal-soft); }
    .run-card-top { display: flex; justify-content: space-between; gap: 8px; }
    .run-card-id { font: 700 12px/1.4 "Cascadia Mono", Consolas, monospace; overflow-wrap: anywhere; }
    .run-card-date { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip { border: 1px solid var(--line); border-radius: 3px; padding: 2px 6px; background: var(--surface-soft); color: var(--ink-soft); font-size: 10px; font-weight: 700; }
    .empty { padding: 18px; color: var(--muted); font-size: 13px; }

    .history-panel {
      flex: 1 1 auto;
      min-height: 0;
      height: 100%;
    }
    .history-tools { display: flex; align-items: center; gap: 8px; }
    .history-tools input { min-width: 260px; }
    .history-layout {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
    }
    .history-layout > .run-list {
      max-height: none;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: var(--surface-soft);
    }
    .history-layout > .run-list .run-card { border-bottom: 1px solid var(--line); }
    .run-detail {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 13px;
      padding: 14px;
    }
    .detail-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .detail-heading h2 { margin: 0; font: 700 19px/1.2 Bahnschrift, "Segoe UI", sans-serif; overflow-wrap: anywhere; }
    .detail-summary { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
    .detail-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; }
    .detail-message { min-height: 16px; margin: 0; color: var(--ink-soft); font-size: 12px; }
    .detail-message.error { color: var(--red); }
    .download { min-height: 36px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid transparent; border-radius: var(--radius); padding: 7px 11px; background: var(--teal); color: #fff; font-weight: 700; text-decoration: none; white-space: nowrap; }
    .more-downloads { position: relative; }
    .more-downloads > summary {
      list-style: none;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 7px 11px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .more-downloads > summary::-webkit-details-marker { display: none; }
    .more-downloads[open] > summary { border-color: var(--teal); color: var(--teal); background: var(--teal-soft); }
    .more-downloads-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 20;
      min-width: 180px;
      display: grid;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .more-downloads-menu a {
      min-height: 36px;
      display: flex;
      align-items: center;
      padding: 7px 12px;
      color: var(--ink);
      font-weight: 650;
      text-decoration: none;
      border-bottom: 1px solid var(--line);
    }
    .more-downloads-menu a:last-child { border-bottom: 0; }
    .more-downloads-menu a:hover { background: var(--surface-soft); }
    .file-groups { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .file-group {
      display: flex;
      flex-direction: column;
      max-height: 280px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .file-group header {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }
    .file-group-body { flex: 1 1 auto; min-height: 0; overflow: auto; }
    .file-group-note {
      flex: 0 0 auto;
      padding: 6px 10px;
      border-top: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 11px;
    }
    .file-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; padding: 7px 10px; border-bottom: 1px solid var(--line); }
    .file-row:last-child { border-bottom: 0; }
    .file-name { overflow-wrap: anywhere; font: 11px/1.45 "Cascadia Mono", Consolas, monospace; }
    .muted { color: var(--muted); }
    .log-dialog {
      width: min(960px, calc(100vw - 28px));
      max-height: min(82vh, 860px);
      margin: auto;
      padding: 0;
      border: 1px solid #2e3a40;
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--shadow);
    }
    .log-dialog::backdrop { background: rgba(24, 33, 39, .48); }
    .log-dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 50px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-raised);
    }
    .log-dialog-head h2 { margin: 0; font: 700 15px/1.2 Bahnschrift, "Segoe UI", sans-serif; }
    .log-dialog-meta {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font: 11px/1.4 "Cascadia Mono", Consolas, monospace;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .log-dialog-title-wrap { min-width: 0; display: grid; gap: 2px; }
    .log-dialog-body {
      margin: 0;
      min-height: 280px;
      max-height: min(58vh, 620px);
      overflow: auto;
      padding: 14px;
      background: var(--terminal);
      color: var(--terminal-ink);
      font: 12px/1.62 "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .log-dialog-foot {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid var(--line);
      background: var(--surface-raised);
    }

    .settings-shell {
      flex: 1 1 auto;
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
    }
    .settings-nav {
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--line);
      background: var(--surface-soft);
    }
    .settings-search { flex: 0 0 auto; padding: 12px; border-bottom: 1px solid var(--line); }
    .settings-tabs { flex: 1 1 auto; min-height: 0; overflow: auto; display: grid; align-content: start; padding: 7px; }
    .settings-tab {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 0;
      background: transparent;
      color: var(--ink-soft);
      text-align: left;
    }
    .settings-tab.active { background: #fff; color: var(--teal); box-shadow: inset 3px 0 0 var(--teal); }
    .settings-tab-count { color: var(--muted); font: 11px/1 "Cascadia Mono", Consolas, monospace; }
    .settings-main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }
    .settings-head { flex: 0 0 auto; min-height: 68px; padding: 12px 18px; border-bottom: 1px solid var(--line); }
    .settings-head h2, .settings-head h1 { margin: 0; font: 700 20px/1.2 Bahnschrift, "Segoe UI", sans-serif; }
    .settings-head p { margin: 4px 0 0; color: var(--muted); }
    .settings-body {
      min-height: 0;
      overflow: auto;
    }
    .config-sections { padding: 5px 18px 18px; }
    .config-group { display: none; }
    .config-group.active { display: block; }
    .config-fields { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); column-gap: 20px; }
    .config-field { min-width: 0; display: grid; align-content: start; gap: 6px; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .config-field.wide { grid-column: 1 / -1; }
    .config-field.hidden-by-search { display: none; }
    .config-field[data-disabled="true"] { opacity: .58; }
    .field-heading { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    .field-heading label { font-weight: 700; }
    .config-key { color: var(--muted); font: 10px/1.3 "Cascadia Mono", Consolas, monospace; overflow-wrap: anywhere; text-align: right; }
    .field-note { min-height: 18px; margin: 0; color: var(--muted); font-size: 11px; }
    .switch-row { min-height: 38px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .switch-copy { color: var(--ink-soft); font-size: 12px; }
    .switch { position: relative; width: 42px; height: 24px; flex: 0 0 auto; }
    .switch input { position: absolute; opacity: 0; pointer-events: none; }
    .switch-track { position: absolute; inset: 0; border: 1px solid var(--line-strong); border-radius: 12px; background: #dfe5e8; transition: .15s ease; cursor: pointer; }
    .switch-track::after { content: ""; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(24,33,39,.24); transition: .15s ease; }
    .switch input:checked + .switch-track { border-color: var(--teal); background: var(--teal); }
    .switch input:checked + .switch-track::after { transform: translateX(18px); }
    .switch input:focus-visible + .switch-track { outline: 3px solid rgba(46,99,135,.24); outline-offset: 2px; }
    .password-wrap { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 7px; }
    .settings-footer {
      position: relative;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 18px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.96);
    }
    .save-state { color: var(--muted); font-size: 12px; }
    .save-state.dirty { color: var(--amber); font-weight: 700; }
    .save-state.error { color: var(--red); }
    .settings-actions { display: flex; gap: 8px; }
    .dependency-strip { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
    .dependency-item { border: 1px solid var(--line); border-radius: 4px; padding: 4px 7px; background: var(--surface-soft); color: var(--muted); font-size: 11px; }
    .dependency-item.on { border-color: #a9d6cb; background: var(--teal-soft); color: var(--teal); }
    .dependency-item.blocked { border-color: #e4c78e; background: var(--amber-soft); color: var(--amber); }
    .no-results { display: none; padding: 34px 18px; color: var(--muted); text-align: center; }

    @media (max-height: 860px) {
      .shell { padding: 10px 16px 12px; gap: 10px; }
      .run-identity, .run-metrics, .run-controls { padding: 10px 12px; }
      .metric-value { font-size: 22px; }
      .panel-head { min-height: 42px; padding: 8px 12px; }
      .stage { min-height: 42px; }
      .stage:not(:last-child)::after { top: 30px; bottom: -12px; }
    }
    @media (max-width: 1180px) {
      .run-dock { grid-template-columns: minmax(250px, .8fr) minmax(410px, 1.2fr); }
      .run-controls { grid-column: 1 / -1; border-top: 1px solid var(--line); }
      .run-identity { border-right: 1px solid var(--line); }
      .run-metrics { border-right: 0; }
      .overview-grid { grid-template-columns: minmax(0, 1.35fr) minmax(300px, .75fr); }
    }
    @media (max-width: 860px) {
      body { overflow: auto; height: auto; min-height: 100dvh; }
      .shell { overflow: visible; height: auto; flex: 1 0 auto; padding: 10px 12px 14px; gap: 10px; }
      .view.active { display: block; overflow: visible; }
      .overview-grid, .side-stack, .history-panel, .settings-shell { height: auto; min-height: 0; }
      .header-inner { grid-template-columns: 1fr auto; gap: 10px; min-height: 52px; }
      .primary-nav { grid-column: 1 / -1; grid-row: 2; order: 3; justify-content: stretch; height: 40px; margin: 0 -12px; border-top: 1px solid #344149; }
      .nav-button { flex: 1; min-width: 0; }
      .header-state { justify-self: end; }
      .run-dock, .overview-grid, .history-layout, .settings-shell { grid-template-columns: 1fr; }
      .run-identity, .run-metrics, .run-controls { padding: 8px 10px; }
      .run-identity { gap: 5px; }
      .section-label { font-size: 10px; }
      .phase { font-size: 12px; }
      .run-metrics { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .metric { padding: 0 6px; }
      .metric-value { font-size: 18px; }
      .metric-label { margin-top: 2px; font-size: 10px; }
      .run-controls { grid-template-columns: 1fr 1fr auto auto; gap: 6px; }
      .compact-field { font-size: 10px; }
      .compact-field input { min-height: 34px; padding: 6px 8px; }
      .run-controls button { min-height: 34px; padding: 6px 10px; }
      .run-message { min-height: 14px; font-size: 11px; }
      .side-stack { grid-template-rows: auto auto; gap: 10px; }
      .run-identity, .run-metrics { border-right: 0; }
      .run-identity { border-bottom: 1px solid var(--line); }
      .run-controls { grid-column: auto; }
      .history-layout > .run-list { max-height: 220px; border-right: 0; border-bottom: 1px solid var(--line); }
      .file-group { max-height: 200px; }
      .settings-nav { border-right: 0; border-bottom: 1px solid var(--line); max-height: none; }
      .settings-tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); overflow: visible; }
      .settings-tab { justify-content: center; min-height: 38px; }
      .settings-tab-count { display: none; }
      .settings-body { overflow: visible; }
      .terminal { min-height: 280px; }
      pre { min-height: 280px; max-height: 45vh; }
      .log-dialog { width: calc(100vw - 16px); max-height: 88vh; }
      .log-dialog-body { min-height: 220px; max-height: 58vh; }
    }
    @media (max-width: 620px) {
      .shell { padding: 8px 8px 12px; gap: 8px; }
      .header-inner { padding: 0 10px; min-height: 48px; }
      .primary-nav { margin: 0 -10px; height: 38px; }
      .brand-sub { display: none; }
      .brand-mark { width: 28px; height: 28px; font-size: 11px; }
      .brand-name { font-size: 16px; }
      .header-state span:last-child { display: none; }
      .run-identity, .run-metrics, .run-controls { padding: 6px 8px; }
      .run-identity { gap: 4px; }
      .phase { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 11px; }
      .status-badge { min-height: 22px; padding: 1px 7px; font-size: 11px; }
      .run-id { font-size: 10px; }
      .progress-track { height: 3px; }
      .run-metrics { grid-template-columns: repeat(5, minmax(0, 1fr)); overflow-x: visible; }
      .metric { padding: 0 3px; }
      .metric-value { font-size: 15px; }
      .metric-label { margin-top: 1px; font-size: 9px; }
      .run-controls { grid-template-columns: 1fr 1fr; gap: 5px; }
      .compact-field input { min-height: 32px; }
      .run-controls button { width: 100%; min-height: 32px; padding: 5px 8px; }
      .run-message { min-height: 12px; font-size: 10px; }
      .history-tools { width: 100%; }
      .history-tools input { min-width: 0; }
      .panel-head { align-items: flex-start; min-height: 40px; padding: 8px 10px; }
      .file-groups, .config-fields { grid-template-columns: 1fr; }
      .file-group { max-height: 180px; }
      .config-field.wide { grid-column: auto; }
      .settings-tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .settings-head, .config-sections, .settings-footer { padding-left: 10px; padding-right: 10px; }
      .settings-footer { align-items: flex-start; flex-direction: column; }
      .settings-actions { width: 100%; }
      .settings-actions button { flex: 1; }
      .detail-heading { display: grid; }
      .detail-actions { gap: 6px; }
      .more-downloads { width: 100%; }
      .more-downloads > summary { width: 100%; }
      .more-downloads-menu { left: 0; right: 0; min-width: 0; width: 100%; }
      .terminal { min-height: 240px; }
      pre { min-height: 240px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">GR</div>
        <div><div class="brand-name">Grok Register</div><div class="brand-sub">本地注册流水线</div></div>
      </div>
      <nav class="primary-nav" aria-label="主导航">
        <button type="button" class="nav-button active" data-view="overview">运行台</button>
        <button type="button" class="nav-button" data-view="history">历史记录</button>
        <button type="button" class="nav-button" data-view="settings">配置</button>
      </nav>
      <div class="header-state" aria-live="polite"><i id="headerDot" class="state-dot"></i><span id="headerStatus">读取状态</span></div>
    </div>
  </header>

  <main class="shell">
    <section class="run-dock" aria-label="任务控制">
      <div class="run-identity">
        <div class="section-label">当前任务</div>
        <div class="run-line"><span id="statusBadge" class="status-badge">读取中</span><span id="runID" class="run-id">尚无运行记录</span></div>
        <p id="phase" class="phase">正在读取当前状态。</p>
        <div id="progressTrack" class="progress-track" role="progressbar" aria-label="任务进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="progressFill" class="progress-fill"></div></div>
      </div>
      <div class="run-metrics">
        <div class="metric"><strong id="done" class="metric-value">0</strong><span class="metric-label">完成</span></div>
        <div class="metric"><strong id="target" class="metric-value">0</strong><span class="metric-label">目标</span></div>
        <div class="metric"><strong id="oauth" class="metric-value">0</strong><span class="metric-label">OAuth</span></div>
        <div class="metric"><strong id="fail" class="metric-value">0</strong><span class="metric-label">失败</span></div>
        <div class="metric"><strong id="rate" class="metric-value">0</strong><span class="metric-label">每分钟</span></div>
      </div>
      <form id="controlForm" class="run-controls">
        <label class="compact-field">目标数量<input id="targetInput" type="number" min="1" max="10000" value="10" required></label>
        <label class="compact-field">并发线程<input id="threadInput" type="number" min="1" max="8" value="2" required></label>
        <button id="startButton" type="submit">启动任务</button>
        <button id="stopButton" type="button" class="danger">停止</button>
        <div id="runMessage" class="run-message" role="status"></div>
      </form>
    </section>

    <section id="view-overview" class="view active">
      <div class="overview-grid">
        <section class="panel">
          <div class="panel-head"><h1 class="panel-title">实时日志</h1><span id="logPath" class="panel-meta">等待日志</span></div>
          <div class="terminal"><pre id="logs">读取日志中...</pre></div>
        </section>
        <aside class="side-stack">
          <section class="panel">
            <div class="panel-head"><h2 class="panel-title">产出流程</h2><span class="panel-meta">按当前配置</span></div>
            <div id="pipeline" class="pipeline"></div>
          </section>
          <section class="panel">
            <div class="panel-head"><h2 class="panel-title">最近任务</h2><button type="button" class="quiet nav-jump" data-view="history">全部记录</button></div>
            <div id="recentRuns" class="recent-list"><div class="empty">读取中</div></div>
          </section>
        </aside>
      </div>
    </section>

    <section id="view-history" class="view">
      <section class="panel history-panel">
        <div class="panel-head">
          <div><h1 class="panel-title">历史记录</h1><span class="panel-meta">历史记录包含输出文件和对应日志</span></div>
          <div class="history-tools"><input id="historySearch" type="search" placeholder="搜索 run 或输出类型"><button id="refreshHistory" type="button" class="secondary">刷新</button></div>
        </div>
        <div class="history-layout">
          <div id="runs" class="run-list"><div class="empty">读取中</div></div>
          <div id="runDetail" class="run-detail"><div class="empty">选择一条记录查看输出文件和历史日志。</div></div>
        </div>
      </section>
    </section>

    <section id="view-settings" class="view">
      <section class="panel settings-shell">
        <aside class="settings-nav">
          <div class="settings-search"><input id="configSearch" type="search" placeholder="搜索配置项"></div>
          <nav id="settingsTabs" class="settings-tabs" aria-label="配置分类"></nav>
        </aside>
        <div class="settings-main">
          <header class="settings-head">
            <h1 id="settingsTitle">输出与结果</h1>
            <p id="settingsDescription">控制成功判定、输出文件和后续 CPA 链路。</p>
            <div id="dependencyStrip" class="dependency-strip"></div>
          </header>
          <div class="settings-body"><div id="configSections" class="config-sections"></div><div id="noConfigResults" class="no-results">没有匹配的配置项。</div></div>
          <footer class="settings-footer">
            <span id="saveState" class="save-state" role="status">配置读取中</span>
            <div class="settings-actions"><button id="checkCPA" type="button" class="secondary">检测 CPA</button><button id="saveConfig" type="button">保存更改</button></div>
          </footer>
        </div>
      </section>
    </section>
  </main>

  <dialog id="logDialog" class="log-dialog" aria-labelledby="logDialogTitle">
    <div class="log-dialog-head">
      <div class="log-dialog-title-wrap">
        <h2 id="logDialogTitle">历史日志</h2>
        <span id="logDialogMeta" class="log-dialog-meta"></span>
      </div>
      <button type="button" class="secondary" id="logDialogClose">关闭</button>
    </div>
    <pre id="logDialogBody" class="log-dialog-body"></pre>
    <div class="log-dialog-foot">
      <a id="logDialogDownload" class="download secondary" href="#" hidden>下载日志</a>
      <button type="button" class="secondary" id="logDialogCloseFoot">关闭</button>
    </div>
  </dialog>

  <script>
    const $ = (id) => document.getElementById(id);
    const groups = [
      { id: "output", label: "输出与结果", description: "控制成功判定、输出文件和后续 CPA 链路。" },
      { id: "email", label: "邮箱", description: "选择收件方式并配置验证码轮询。" },
      { id: "clearance", label: "清障与指纹", description: "配置 Cloudflare 清障栈、访问代理和 TLS 指纹。" },
      { id: "engine", label: "注册引擎", description: "控制 Turnstile、HTTP 并发、OAuth 和 CPA 探活节奏。" },
      { id: "network", label: "网络代理", description: "设置进程级 HTTP 代理和不经过代理的地址。" },
      { id: "cpa", label: "CPA 上传", description: "配置 Management API、上传格式、重试和结果校验。" }
    ];
    const fields = [
      { key: "OUTPUT_SSO_ENABLED", group: "output", label: "SSO 文件输出", type: "bool", note: "默认开启（与上游一致）。写入 accounts.txt 和 auth-sessions.jsonl；关闭时仍可继续 OAuth/CPA，只是不写 SSO 文件。" },
      { key: "OUTPUT_GROK2API_SSO_ENABLED", group: "output", label: "grok2api SSO", type: "bool", note: "默认开启。写入 grok2api/tokens.txt；依赖 SSO 文件输出。" },
      { key: "OUTPUT_CPA_ENABLED", group: "output", label: "CPA 输出", type: "bool", note: "默认开启（与上游全链路一致）。关闭后：拿到 SSO 即计完成并跳过 OAuth/探活/CPA；开启时完成口径为 CPA 就绪。" },
      { key: "EMAIL_MODE", group: "email", label: "邮箱模式", type: "select", options: [["tempmail", "tempmail.lol"], ["testmail", "testmail.app"], ["custom", "自建域名邮箱"]] },
      { key: "EMAIL_DOMAIN", group: "email", label: "自建邮箱域名", placeholder: "example.com", depends: "email-custom" },
      { key: "EMAIL_API", group: "email", label: "自建邮箱 API", type: "url", placeholder: "http://127.0.0.1:8080", depends: "email-custom" },
      { key: "TESTMAIL_API_KEY", group: "email", label: "Testmail API Key", type: "password", depends: "email-testmail" },
      { key: "TESTMAIL_NAMESPACE", group: "email", label: "Testmail Namespace", depends: "email-testmail" },
      { key: "TESTMAIL_DOMAIN", group: "email", label: "Testmail Domain", placeholder: "inbox.testmail.app", depends: "email-testmail" },
      { key: "TEMPMAIL_LOL_RETRIES", group: "email", label: "邮箱轮询次数", type: "number", min: "1", step: "1" },
      { key: "TEMPMAIL_LOL_MIN_INTERVAL_MS", group: "email", label: "邮箱轮询间隔", type: "number", min: "100", step: "100", suffix: "ms" },
      { key: "CLEARANCE_ENABLED", group: "clearance", label: "启用清障栈", type: "bool" },
      { key: "CLEARANCE_MODE", group: "clearance", label: "清障策略", type: "select", options: [["auto", "自动：遇到拦截时启动"], ["always", "总是启动"], ["never", "永不启动"]], depends: "clearance" },
      { key: "CLEARANCE_AUTO_STOP", group: "clearance", label: "结束后停止清障栈", type: "bool", depends: "clearance" },
      { key: "CLEARANCE_COMPOSE_DIR", group: "clearance", label: "清障 Compose 目录", placeholder: "留空则自动发现", depends: "clearance" },
      { key: "REGISTER_PROXY", group: "clearance", label: "注册代理", type: "url", note: "协议注册与浏览器 mint 使用的 HTTP 代理；与是否启用清障栈无关。" },
      { key: "FLARESOLVERR_URL", group: "clearance", label: "FlareSolverr URL", type: "url", depends: "clearance" },
      { key: "CLEARANCE_PROXY", group: "clearance", label: "清障代理", type: "url", depends: "clearance" },
      { key: "CLEARANCE_URLS", group: "clearance", label: "清障 URL", type: "textarea", wide: true, depends: "clearance" },
      { key: "CF_IMPERSONATE", group: "clearance", label: "TLS 指纹", placeholder: "chrome_131" },
      { key: "CF_IMPERSONATE_FALLBACK", group: "clearance", label: "TLS 备用指纹", placeholder: "chrome_124,chrome_120" },
      { key: "TURNSTILE_PROVIDER", group: "engine", label: "Turnstile Provider", placeholder: "browser" },
      { key: "TURNSTILE_MODE", group: "engine", label: "Turnstile 模式", type: "select", options: [["offscreen", "offscreen"], ["headless", "headless"], ["auto", "auto"]] },
      { key: "CHROME_PATH", group: "engine", label: "Chrome 路径", placeholder: "留空则自动探测", note: "原生部署可指定 Chrome/Chromium 可执行文件；Docker 中必须使用容器内路径。", wide: true },
      { key: "LITE_SOLVER_URL", group: "engine", label: "Lite Solver URL", type: "url" },
      { key: "PROTOCOL_HTTP", group: "engine", label: "协议 HTTP 客户端", type: "bool" },
      { key: "HTTP_POOL_SIZE", group: "engine", label: "HTTP 并发池", type: "number", min: "1", step: "1" },
      { key: "PHYSICAL_CAP", group: "engine", label: "物理并发上限", type: "number", min: "0", step: "1", note: "0 表示不额外限制。" },
      { key: "TURNSTILE_WORKERS", group: "engine", label: "Web 启动默认线程", type: "number", min: "1", max: "8", step: "1", note: "仅 Web/Docker 启动时作为 --thread/-j 默认值；CLI 的 grok start 不读此项（与上游一致），请用 --thread。" },
      { key: "OAUTH_MIN_INTERVAL_SEC", group: "engine", label: "OAuth 最小间隔", type: "number", min: "0", step: "0.5", suffix: "秒" },
      { key: "OAUTH_RETRY_SEC", group: "engine", label: "OAuth 重试冷却", type: "number", min: "0", step: "0.5", suffix: "秒" },
      { key: "OAUTH_WORKERS", group: "engine", label: "OAuth Workers", type: "number", min: "0", max: "4", step: "1", note: "0 表示自动选择并发数。", depends: "cpa-output" },
      { key: "PROBE_ENABLED", group: "engine", label: "CPA 探活", type: "bool", depends: "cpa-output" },
      { key: "PROBE_WARMUP_SEC", group: "engine", label: "探活预热", type: "number", min: "0", step: "0.1", suffix: "秒", depends: "probe" },
      { key: "HTTPS_PROXY", group: "network", label: "HTTPS Proxy", placeholder: "http://privoxy:8118" },
      { key: "HTTP_PROXY", group: "network", label: "HTTP Proxy", placeholder: "http://privoxy:8118" },
      { key: "NO_PROXY", group: "network", label: "No Proxy", type: "textarea", wide: true, note: "多个主机名使用英文逗号分隔。" },
      { key: "CPA_UPLOAD_ENABLED", group: "cpa", label: "CPA 自动上传", type: "bool", note: "只有 CPA 输出同时开启时才会上传。", depends: "cpa-output" },
      { key: "CPA_MANAGEMENT_BASE", group: "cpa", label: "Management Base", type: "url", depends: "cpa-upload" },
      { key: "CPA_MANAGEMENT_KEY", group: "cpa", label: "Management Key", type: "password", depends: "cpa-upload" },
      { key: "CPA_UPLOAD_TIMEOUT_SEC", group: "cpa", label: "上传超时", type: "number", min: "1", step: "1", suffix: "秒", depends: "cpa-upload" },
      { key: "CPA_UPLOAD_RETRIES", group: "cpa", label: "上传重试次数", type: "number", min: "0", step: "1", depends: "cpa-upload" },
      { key: "CPA_UPLOAD_NAME_TEMPLATE", group: "cpa", label: "文件名模板", placeholder: "{email}", note: "可用 {email}、{provider}、{sub}；.json 扩展名会自动补齐。", depends: "cpa-upload" },
      { key: "CPA_UPLOAD_VERIFY", group: "cpa", label: "上传后校验", type: "bool", depends: "cpa-upload" },
      { key: "CPA_UPLOAD_MODE", group: "cpa", label: "上传格式", type: "select", options: [["multipart", "multipart"], ["json", "json"]], depends: "cpa-upload" }
    ];
    const configKeys = fields.map((field) => field.key);
    const POLL_RUNNING_MS = 3000;
    const POLL_IDLE_MS = 15000;
    const state = {
      view: "overview",
      status: "stopped",
      runs: [],
      runsSig: "",
      selectedRun: "",
      query: "",
      config: {},
      savedConfig: {},
      configGroup: "output",
      configQuery: "",
      pollTimer: 0,
      detailSeq: 0,
      logSize: 0,
      logMtime: 0,
      logPath: "",
      logsPrimed: false,
      statusSig: "",
      snapshot: null
    };

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));
    }
    function formatSize(bytes) {
      if (!bytes) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      let value = Number(bytes), unit = 0;
      while (value >= 1024 && unit < units.length - 1) { value /= 1024; unit += 1; }
      return (unit ? value.toFixed(value >= 10 ? 0 : 1) : value) + " " + units[unit];
    }
    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? value : new Intl.DateTimeFormat("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).format(date);
    }
    function formatElapsed(startedAt) {
      if (!startedAt) return "";
      const start = new Date(startedAt).getTime();
      if (Number.isNaN(start)) return "";
      let sec = Math.max(0, Math.floor((Date.now() - start) / 1000));
      const h = Math.floor(sec / 3600);
      sec %= 3600;
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      if (h) return h + " 小时 " + m + " 分";
      if (m) return m + " 分 " + s + " 秒";
      return s + " 秒";
    }
    function isNearBottom(el, threshold) {
      if (!el) return true;
      const gap = el.scrollHeight - el.scrollTop - el.clientHeight;
      return gap <= (threshold ?? 48);
    }
    function isConfigDirty() {
      return configKeys.some((key) => fieldValue(key) !== (state.savedConfig[key] ?? ""));
    }
    async function api(url, options) {
      const response = await fetch(url, options);
      const text = await response.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch { data = { error: text || "请求失败" }; }
      if (!response.ok) throw new Error(data.error || ("HTTP " + response.status));
      return data;
    }

    function renderConfigUI() {
      $("settingsTabs").innerHTML = groups.map((group) => {
        const count = fields.filter((field) => field.group === group.id).length;
        return `<button type="button" class="settings-tab${group.id === state.configGroup ? " active" : ""}" data-config-group="${group.id}"><span>${group.label}</span><span class="settings-tab-count">${count}</span></button>`;
      }).join("");
      $("configSections").innerHTML = groups.map((group) => {
        const content = fields.filter((field) => field.group === group.id).map(renderConfigField).join("");
        return `<section id="config-group-${group.id}" class="config-group${group.id === state.configGroup ? " active" : ""}" data-group="${group.id}"><div class="config-fields">${content}</div></section>`;
      }).join("");
      for (const button of document.querySelectorAll("[data-config-group]")) button.addEventListener("click", () => selectConfigGroup(button.dataset.configGroup));
      for (const field of fields) {
        const input = $(field.key);
        if (!input) continue;
        input.addEventListener("change", configChanged);
        input.addEventListener("input", configChanged);
      }
      for (const button of document.querySelectorAll("[data-reveal]")) {
        button.addEventListener("click", () => {
          const input = $(button.dataset.reveal);
          const showing = input.type === "text";
          input.type = showing ? "password" : "text";
          button.textContent = showing ? "显示" : "隐藏";
        });
      }
    }
    function renderConfigField(field) {
      let control = "";
      if (field.type === "bool") {
        control = `<div class="switch-row"><span class="switch-copy">关闭 / 开启</span><label class="switch"><input id="${field.key}" type="checkbox"><span class="switch-track"></span></label></div>`;
      } else if (field.type === "select") {
        control = `<select id="${field.key}">${field.options.map(([value, label]) => `<option value="${escapeHTML(value)}">${escapeHTML(label)}</option>`).join("")}</select>`;
      } else if (field.type === "textarea") {
        control = `<textarea id="${field.key}"${field.placeholder ? ` placeholder="${escapeHTML(field.placeholder)}"` : ""}></textarea>`;
      } else {
        const type = field.type === "password" ? "password" : field.type === "number" ? "number" : field.type === "url" ? "url" : "text";
        const attrs = [field.min && `min="${field.min}"`, field.max && `max="${field.max}"`, field.step && `step="${field.step}"`, field.placeholder && `placeholder="${escapeHTML(field.placeholder)}"`, field.type === "password" && "autocomplete=\"off\""].filter(Boolean).join(" ");
        const input = `<input id="${field.key}" type="${type}" ${attrs}>`;
        control = field.type === "password" ? `<div class="password-wrap">${input}<button type="button" class="secondary" data-reveal="${field.key}">显示</button></div>` : input;
      }
      const note = field.note || (field.suffix ? `单位：${field.suffix}` : "");
      const search = `${field.label} ${field.key} ${note}`.toLowerCase();
      return `<div id="field-${field.key}" class="config-field${field.wide ? " wide" : ""}" data-key="${field.key}" data-search="${escapeHTML(search)}" data-depends="${field.depends || ""}"><div class="field-heading"><label for="${field.key}">${field.label}</label><span class="config-key">${field.key}</span></div>${control}<p class="field-note">${escapeHTML(note)}</p></div>`;
    }
    function selectConfigGroup(groupID) {
      state.configGroup = groupID;
      for (const button of document.querySelectorAll("[data-config-group]")) button.classList.toggle("active", button.dataset.configGroup === groupID);
      for (const section of document.querySelectorAll(".config-group")) section.classList.toggle("active", section.dataset.group === groupID);
      const group = groups.find((item) => item.id === groupID);
      if (group) { $("settingsTitle").textContent = group.label; $("settingsDescription").textContent = group.description; }
      state.configQuery = "";
      $("configSearch").value = "";
      filterConfig();
    }
    function fieldValue(key) {
      const input = $(key);
      if (!input) return "";
      return input.type === "checkbox" ? (input.checked ? "1" : "0") : input.value.trim();
    }
    function readFormConfig() {
      return Object.fromEntries(configKeys.map((key) => [key, fieldValue(key)]));
    }
    function setFormConfig(config) {
      for (const field of fields) {
        const input = $(field.key);
        if (!input) continue;
        if (input.type === "checkbox") input.checked = config[field.key] === "1";
        else input.value = config[field.key] ?? "";
      }
    }
    function configChanged() {
      state.config = readFormConfig();
      const dirty = configKeys.filter((key) => state.config[key] !== state.savedConfig[key]);
      $("saveState").textContent = dirty.length ? `有 ${dirty.length} 项未保存` : "配置已同步";
      $("saveState").className = "save-state" + (dirty.length ? " dirty" : "");
      $("saveConfig").disabled = !dirty.length;
      if ($("TURNSTILE_WORKERS") && document.activeElement === $("TURNSTILE_WORKERS")) $("threadInput").value = fieldValue("TURNSTILE_WORKERS") || "2";
      updateDependencies();
      renderPipeline();
    }
    function setDependentField(key, disabled) {
      const wrap = $("field-" + key);
      const input = $(key);
      if (wrap) wrap.dataset.disabled = disabled ? "true" : "false";
      if (input) input.disabled = disabled;
      const reveal = document.querySelector(`[data-reveal="${key}"]`);
      if (reveal) reveal.disabled = disabled;
    }
    function updateDependencies() {
      const cfg = readFormConfig();
      const sso = cfg.OUTPUT_SSO_ENABLED === "1";
      const cpa = cfg.OUTPUT_CPA_ENABLED === "1";
      const upload = cpa && cfg.CPA_UPLOAD_ENABLED === "1";
      const clearance = cfg.CLEARANCE_ENABLED === "1";
      const emailMode = cfg.EMAIL_MODE;
      const probe = cpa && cfg.PROBE_ENABLED === "1";
      for (const field of fields) {
        let disabled = false;
        if (field.key === "OUTPUT_GROK2API_SSO_ENABLED") disabled = !sso;
        if (field.depends === "email-custom") disabled = emailMode !== "custom";
        if (field.depends === "email-testmail") disabled = emailMode !== "testmail";
        if (field.depends === "clearance") disabled = !clearance;
        if (field.depends === "cpa-output") disabled = !cpa;
        if (field.depends === "cpa-upload") disabled = !upload;
        if (field.depends === "probe") disabled = !probe;
        setDependentField(field.key, disabled);
      }
      $("dependencyStrip").innerHTML = [
        ["SSO", sso, false],
        ["grok2api", sso && cfg.OUTPUT_GROK2API_SSO_ENABLED === "1", !sso],
        ["CPA", cpa, false],
        ["OAuth / 探活", cpa, !cpa],
        ["自动上传", upload, !cpa]
      ].map(([label, on, blocked]) => `<span class="dependency-item ${on ? "on" : blocked ? "blocked" : ""}">${label}：${on ? "开启" : blocked ? "不生效" : "关闭"}</span>`).join("");
    }
    function filterConfig() {
      const query = state.configQuery.trim().toLowerCase();
      let visible = 0;
      if (query) {
        for (const section of document.querySelectorAll(".config-group")) section.classList.add("active");
        for (const field of document.querySelectorAll(".config-field")) {
          const show = field.dataset.search.includes(query);
          field.classList.toggle("hidden-by-search", !show);
          if (show) visible += 1;
        }
      } else {
        for (const section of document.querySelectorAll(".config-group")) section.classList.toggle("active", section.dataset.group === state.configGroup);
        for (const field of document.querySelectorAll(".config-field")) field.classList.remove("hidden-by-search");
        visible = fields.filter((field) => field.group === state.configGroup).length;
      }
      $("noConfigResults").style.display = visible ? "none" : "block";
    }
    async function loadConfig() {
      try {
        const config = await api("/api/config");
        $("targetInput").value = config.GROK_TARGET || "10";
        state.config = Object.fromEntries(configKeys.map((key) => [key, config[key] ?? ""]));
        state.savedConfig = { ...state.config };
        setFormConfig(state.config);
        $("threadInput").value = state.config.TURNSTILE_WORKERS || "2";
        $("saveConfig").disabled = true;
        $("saveState").textContent = "配置已同步";
        updateDependencies();
        renderPipeline();
      } catch (error) {
        $("saveState").textContent = "读取失败：" + error.message;
        $("saveState").className = "save-state error";
      }
    }
    async function saveConfig() {
      const invalid = fields.map((field) => $(field.key)).find((input) => input && !input.disabled && !input.checkValidity());
      if (invalid) { invalid.reportValidity(); return false; }
      $("saveConfig").disabled = true;
      $("saveState").textContent = "正在保存...";
      $("saveState").className = "save-state";
      try {
        const next = readFormConfig();
        const result = await api("/api/config", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(next) });
        state.config = Object.fromEntries(configKeys.map((key) => [key, result.config[key] ?? next[key] ?? ""]));
        state.savedConfig = { ...state.config };
        setFormConfig(state.config);
        $("saveState").textContent = "已保存，新任务将使用最新配置";
        updateDependencies();
        renderPipeline();
        return true;
      } catch (error) {
        $("saveState").textContent = "保存失败：" + error.message;
        $("saveState").className = "save-state error";
        $("saveConfig").disabled = false;
        return false;
      }
    }

    function renderPipeline() {
      const cfg = Object.keys(state.config).length ? readFormConfig() : state.config;
      const phase = state.snapshot?.phase || "idle";
      const running = state.status === "running";
      const sso = cfg.OUTPUT_SSO_ENABLED === "1";
      const grok2api = sso && cfg.OUTPUT_GROK2API_SSO_ENABLED === "1";
      const cpa = cfg.OUTPUT_CPA_ENABLED === "1";
      const upload = cpa && cfg.CPA_UPLOAD_ENABLED === "1";
      const stages = [
        { n: "01", title: "注册与 SSO", detail: sso ? "保留 SSO 文件" : "获得 SSO 后计成功", enabled: true, current: running && (phase === "register" || phase === "clearance" || phase === "idle"), skipped: false },
        { n: "02", title: "grok2api SSO", detail: grok2api ? "写入 tokens.txt" : "不输出", enabled: grok2api, current: false, skipped: !grok2api },
        { n: "03", title: "OAuth 与探活", detail: cpa ? "交换令牌并验证" : "整段跳过", enabled: cpa, current: running && cpa && (phase === "oauth" || phase === "probe"), skipped: !cpa },
        { n: "04", title: "CPA 输出", detail: cpa ? "写入 CPA JSON" : "不输出", enabled: cpa, current: false, skipped: !cpa },
        { n: "05", title: "自动上传", detail: upload ? "发送到 Management API" : "不上传", enabled: upload, current: false, skipped: !upload }
      ];
      $("pipeline").innerHTML = stages.map((stage) => {
        const skipped = !!stage.skipped;
        const current = !!stage.current && !skipped;
        const label = skipped ? "跳过" : current ? "进行中" : stage.enabled ? "启用" : "待执行";
        return `<div class="stage${current ? " active" : ""}${skipped ? " skipped" : ""}"><span class="stage-node">${stage.n}</span><span class="stage-copy"><b>${stage.title}</b><span>${stage.detail}</span></span><span class="stage-state">${label}</span></div>`;
      }).join("");
    }

    function phaseLabel(snapshot) {
      const labels = { idle: "等待启动", clearance: "准备清障环境", register: "注册与获取 SSO", oauth: "OAuth 令牌交换", probe: "CPA 探活" };
      if (snapshot.error) return snapshot.error;
      let text = snapshot.phase_detail || labels[snapshot.phase] || (snapshot.status === "running" ? "任务运行中" : "当前没有运行中的任务");
      if (snapshot.status === "running") {
        const elapsed = formatElapsed(snapshot.started_at);
        if (elapsed) text += " · 已运行 " + elapsed;
      }
      return text;
    }
    async function refreshStatus() {
      try {
        const snapshot = await api("/api/status");
        const nextStatus = snapshot.status || "stopped";
        const sig = [nextStatus, snapshot.run_id, snapshot.done, snapshot.target, snapshot.oauth_count, snapshot.fail_count, snapshot.rate_per_min, snapshot.phase, snapshot.phase_detail, snapshot.error, snapshot.started_at].join("|");
        const statusModeChanged = state.status !== nextStatus;
        state.snapshot = snapshot;
        state.status = nextStatus;
        state.statusSig = sig;
        const running = state.status === "running";
        const errored = state.status === "error";
        const text = running ? "运行中" : errored ? "异常" : "已停止";
        $("statusBadge").textContent = text;
        $("statusBadge").className = "status-badge" + (running ? " running" : errored ? " error" : "");
        $("headerDot").className = "state-dot" + (running ? " running" : errored ? " error" : "");
        $("headerStatus").textContent = text;
        $("runID").textContent = snapshot.run_id || "尚无运行记录";
        $("phase").textContent = phaseLabel(snapshot);
        $("done").textContent = snapshot.done || 0;
        $("target").textContent = snapshot.target || 0;
        $("oauth").textContent = snapshot.oauth_count || 0;
        $("fail").textContent = snapshot.fail_count || 0;
        $("rate").textContent = Number(snapshot.rate_per_min || 0).toFixed(snapshot.rate_per_min >= 10 ? 0 : 1);
        const progress = snapshot.target ? Math.min(100, Math.round((snapshot.done || 0) / snapshot.target * 100)) : 0;
        $("progressFill").style.width = progress + "%";
        const track = $("progressTrack");
        if (track) track.setAttribute("aria-valuenow", String(progress));
        $("startButton").disabled = running;
        $("stopButton").disabled = !running;
        if (statusModeChanged) updatePolling();
        else if (!state.pollTimer) updatePolling();
        renderPipeline();
      } catch (error) {
        $("headerStatus").textContent = "状态不可用";
        $("phase").textContent = error.message;
      }
    }
    async function refreshLogs(force) {
      try {
        let url = "/api/logs?tail=500";
        if (!force && state.logPath && state.logSize) {
          url += "&since_size=" + encodeURIComponent(String(state.logSize)) + "&since_mtime=" + encodeURIComponent(String(state.logMtime));
        }
        const data = await api(url);
        if (data.unchanged) return;
        const pathLabel = data.path ? data.path.split(/[\\/]/).pop() : "尚无日志";
        const text = data.lines?.length ? data.lines.join("\n") : "暂无日志。启动任务后，运行输出会显示在这里。";
        const el = $("logs");
        const follow = !state.logsPrimed || isNearBottom(el);
        if ($("logPath").textContent !== pathLabel) $("logPath").textContent = pathLabel;
        if (el.textContent !== text) el.textContent = text;
        state.logPath = data.path || "";
        state.logSize = data.size || 0;
        state.logMtime = data.mtime || 0;
        state.logsPrimed = true;
        if (follow) el.scrollTop = el.scrollHeight;
      } catch (error) {
        $("logs").textContent = "日志读取失败：" + error.message;
        state.logsPrimed = true;
      }
    }

    function runCard(run, active) {
      return `<button type="button" class="run-card${active ? " active" : ""}" data-run-id="${escapeHTML(run.id)}"><span class="run-card-top"><b class="run-card-id">${escapeHTML(run.id)}</b><span class="run-card-date">${escapeHTML(formatDate(run.modified_at))}</span></span><span class="chips"><span class="chip" title="accounts.txt 行数">账号 ${run.sso_count || 0}</span><span class="chip" title="tokens.txt 非空行数">token 行 ${run.grok2api_sso_count || 0}</span><span class="chip" title="CPA 目录 JSON 文件数">CPA 文件 ${run.cpa_count || 0}</span><span class="chip">丢弃 ${run.discarded_count || 0}</span></span></button>`;
    }
    function bindRunCards(root) {
      for (const card of root.querySelectorAll("[data-run-id]")) card.addEventListener("click", () => { showView("history"); selectRun(card.dataset.runId); });
    }
    function renderRuns(force) {
      const query = state.query.trim().toLowerCase();
      const sig = JSON.stringify(state.runs) + "|" + query + "|" + state.selectedRun;
      if (!force && sig === state.runsSig) return;
      state.runsSig = sig;
      const filtered = state.runs.filter((run) => !query || [run.id, run.log_exists ? "日志" : "", run.sso_count ? "sso" : "", run.grok2api_sso_count ? "grok2api" : "", run.cpa_count ? "cpa" : "", run.discarded_count ? "丢弃" : ""].join(" ").toLowerCase().includes(query));
      $("runs").innerHTML = filtered.length ? filtered.map((run) => runCard(run, run.id === state.selectedRun)).join("") : `<div class="empty">${query ? "没有匹配的历史记录。" : "暂无历史记录。"}</div>`;
      bindRunCards($("runs"));
      const recent = state.runs.slice(0, 4);
      $("recentRuns").innerHTML = recent.length ? recent.map((run) => runCard(run, false)).join("") : '<div class="empty">暂无历史记录。</div>';
      bindRunCards($("recentRuns"));
    }
    async function refreshRuns(force) {
      try {
        const runs = await api("/api/runs");
        state.runs = runs;
        renderRuns(force);
      } catch (error) {
        state.runsSig = "";
        $("runs").innerHTML = `<div class="empty">读取失败：${escapeHTML(error.message)}</div>`;
      }
    }
    async function selectRun(id, silent) {
      state.selectedRun = id;
      const seq = ++state.detailSeq;
      renderRuns(true);
      if (!silent) $("runDetail").innerHTML = '<div class="empty">读取记录详情...</div>';
      try {
        const detail = await api("/api/runs/detail?id=" + encodeURIComponent(id));
        if (seq !== state.detailSeq || state.selectedRun !== id) return;
        renderRunDetail(detail);
      } catch (error) {
        if (seq !== state.detailSeq || state.selectedRun !== id) return;
        $("runDetail").innerHTML = `<div class="empty">读取失败：${escapeHTML(error.message)}</div>`;
      }
    }
    function renderRunDetail(detail) {
      const groups = [
        ["sso", "SSO", "该任务没有 SSO 输出文件。"],
        ["grok2api", "grok2api SSO", "该任务没有 grok2api token 文件。"],
        ["cpa", "CPA", "该任务没有 CPA 输出文件。"],
        ["discarded", "丢弃", "该任务没有丢弃记录。"]
      ];
      const moreLinks = [
        '<a href="' + escapeHTML(detail.download_sso_url) + '">下载 SSO</a>',
        '<a href="' + escapeHTML(detail.download_grok2api_url) + '">下载 grok2api SSO</a>',
        '<a href="' + escapeHTML(detail.download_cpa_url) + '">下载 CPA</a>',
        '<a href="' + escapeHTML(detail.download_discarded_url) + '">下载丢弃</a>'
      ];
      if (detail.log_exists) moreLinks.push('<a href="' + escapeHTML(detail.download_log_url) + '">下载日志</a>');
      const hasLog = !!(detail.log && detail.log.exists);
      $("runDetail").innerHTML = [
        '<div class="detail-heading"><div><h2>' + escapeHTML(detail.id) + '</h2><div class="detail-summary"><span class="chip" title="accounts.txt 行数">账号 ' + (detail.sso_count || 0) + '</span><span class="chip" title="tokens.txt 非空行数">token 行 ' + (detail.grok2api_sso_count || 0) + '</span><span class="chip" title="CPA 目录 JSON 文件数">CPA 文件 ' + (detail.cpa_count || 0) + '</span><span class="chip">' + formatSize(detail.total_size) + '</span></div></div></div>',
        '<div class="detail-actions">',
        '<a class="download" href="' + escapeHTML(detail.download_url) + '">下载全部</a>',
        '<details class="more-downloads"><summary>更多下载</summary><div class="more-downloads-menu">' + moreLinks.join("") + '</div></details>',
        '<button type="button" class="secondary" id="viewRunLog"' + (hasLog ? "" : " disabled") + '>' + (hasLog ? "查看日志" : "无日志") + '</button>',
        '<button type="button" class="secondary" id="copyRunID">复制 run ID</button>',
        '<button type="button" class="secondary" id="deleteRecord" ' + (detail.delete_disabled ? 'disabled' : '') + '>删除记录</button>',
        '<button type="button" class="danger" id="deleteRun" ' + (detail.delete_disabled ? 'disabled' : '') + '>删除记录和文件</button>',
        '</div>',
        '<p id="detailMessage" class="detail-message" role="status"></p>',
        '<div class="file-groups">' + groups.map(([key, label, empty]) => renderFileGroup(label, detail.files[key] || [], empty)).join("") + '</div>'
      ].join("");
      $("copyRunID").addEventListener("click", () => copyRunID(detail.id));
      $("deleteRecord").addEventListener("click", () => deleteSelectedRun(detail.id, "record"));
      $("deleteRun").addEventListener("click", () => deleteSelectedRun(detail.id, "all"));
      $("viewRunLog").addEventListener("click", () => openLogDialog(detail));
      // Close the menu when a download link is chosen.
      const more = document.querySelector(".more-downloads");
      if (more) {
        for (const link of more.querySelectorAll("a")) {
          link.addEventListener("click", () => { more.open = false; });
        }
      }
    }
    function openLogDialog(detail) {
      const dialog = $("logDialog");
      if (!dialog) return;
      const path = detail.log?.path ? detail.log.path.split(/[\\/]/).pop() : "";
      $("logDialogMeta").textContent = path || detail.id || "";
      if (detail.log?.exists && detail.log.lines?.length) {
        $("logDialogBody").textContent = detail.log.lines.join("\n");
      } else if (detail.log?.exists) {
        $("logDialogBody").textContent = "日志文件存在，但没有可显示的内容。";
      } else {
        $("logDialogBody").textContent = "未找到该 run 的日志文件。";
      }
      const download = $("logDialogDownload");
      if (detail.log_exists && detail.download_log_url) {
        download.hidden = false;
        download.href = detail.download_log_url;
      } else {
        download.hidden = true;
        download.removeAttribute("href");
      }
      if (typeof dialog.showModal === "function") dialog.showModal();
      else dialog.setAttribute("open", "");
      $("logDialogBody").scrollTop = 0;
    }
    function closeLogDialog() {
      const dialog = $("logDialog");
      if (!dialog) return;
      if (typeof dialog.close === "function") dialog.close();
      else dialog.removeAttribute("open");
    }
    function renderFileGroup(label, files, emptyText) {
      const truncated = files.length >= 200;
      const countLabel = truncated ? "200+" : String(files.length);
      const note = truncated
        ? '<div class="file-group-note">仅展示前 200 个文件，完整内容请使用上方下载。</div>'
        : (files.length > 8 ? '<div class="file-group-note">列表可滚动；完整打包请下载对应分类。</div>' : "");
      const body = files.length
        ? files.map((file) => `<div class="file-row"><span class="file-name">${escapeHTML(file.name)}</span><span class="muted">${formatSize(file.size)}</span></div>`).join("")
        : `<div class="empty">${escapeHTML(emptyText)}</div>`;
      return `<section class="file-group"><header><b>${escapeHTML(label)}</b><span class="muted">${countLabel}</span></header><div class="file-group-body">${body}</div>${note}</section>`;
    }
    function setDetailMessage(message, error) {
      const el = $("detailMessage");
      if (!el) return;
      el.textContent = message || "";
      el.className = "detail-message" + (error ? " error" : "");
    }
    async function copyRunID(id) {
      try {
        await navigator.clipboard.writeText(id);
        setDetailMessage("已复制 run ID：" + id);
      } catch {
        window.prompt("复制 run ID", id);
        setDetailMessage("请手动复制 run ID：" + id);
      }
    }
    async function deleteSelectedRun(id, mode) {
      const run = state.runs.find((item) => item.id === id);
      if (run?.delete_disabled) { window.alert("当前任务正在运行，停止后才能删除。"); return; }
      const recordOnly = mode === "record";
      const message = recordOnly ? `确定删除历史记录 ${id}？输出文件和日志仍会保留。` : `确定删除记录和文件 ${id}？此操作不可恢复。`;
      if (!window.confirm(message)) return;
      try {
        await api("/api/runs/delete", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ id, mode }) });
        state.selectedRun = "";
        $("runDetail").innerHTML = `<div class="empty">${recordOnly ? "已删除历史记录" : "已删除记录和文件"} ${escapeHTML(id)}。</div>`;
        await refreshRuns();
      } catch (error) { window.alert("删除失败：" + error.message); }
    }

    function showView(view) {
      if (view === state.view) return;
      if (view !== "settings" && state.view === "settings" && isConfigDirty()) {
        if (!window.confirm("配置有未保存更改，切换页面不会自动保存。仍要离开配置页吗？")) return;
      }
      closeLogDialog();
      state.view = view;
      for (const button of document.querySelectorAll(".nav-button")) {
        const active = button.dataset.view === view;
        button.classList.toggle("active", active);
        if (active) button.setAttribute("aria-current", "page");
        else button.removeAttribute("aria-current");
      }
      for (const section of document.querySelectorAll(".view")) section.classList.toggle("active", section.id === "view-" + view);
      if (view === "history") refreshRuns(true);
      if (view === "overview") refreshLogs(true);
    }
    function setRunMessage(message, error) {
      $("runMessage").textContent = message;
      $("runMessage").className = "run-message" + (error ? " error" : "");
    }
    function updatePolling() {
      if (state.pollTimer) {
        window.clearInterval(state.pollTimer);
        state.pollTimer = 0;
      }
      if (document.hidden) return;
      const ms = state.status === "running" ? POLL_RUNNING_MS : POLL_IDLE_MS;
      state.pollTimer = window.setInterval(pollTick, ms);
    }
    async function pollTick() {
      if (document.hidden) return;
      const jobs = [refreshStatus()];
      if (state.view === "overview" && (state.status === "running" || !state.logsPrimed)) jobs.push(refreshLogs(false));
      if (state.view === "history" && state.status === "running") jobs.push(refreshRuns(false));
      await Promise.allSettled(jobs);
    }
    async function refreshVisible() {
      const jobs = [refreshStatus()];
      if (state.view === "overview") jobs.push(refreshLogs(true));
      if (state.view === "history") jobs.push(refreshRuns(true));
      await Promise.allSettled(jobs);
    }

    renderConfigUI();
    $("logDialogClose").addEventListener("click", closeLogDialog);
    $("logDialogCloseFoot").addEventListener("click", closeLogDialog);
    $("logDialog").addEventListener("click", (event) => {
      // Click on backdrop (dialog itself) closes; content stops propagation via default dialog behavior for children.
      if (event.target === $("logDialog")) closeLogDialog();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && $("logDialog")?.open) closeLogDialog();
    });
    for (const button of document.querySelectorAll(".nav-button, .nav-jump")) button.addEventListener("click", () => showView(button.dataset.view));
    const overviewNav = document.querySelector('.nav-button[data-view="overview"]');
    if (overviewNav) overviewNav.setAttribute("aria-current", "page");
    $("configSearch").addEventListener("input", (event) => { state.configQuery = event.target.value; filterConfig(); });
    $("historySearch").addEventListener("input", (event) => { state.query = event.target.value; state.runsSig = ""; renderRuns(true); });
    $("refreshHistory").addEventListener("click", () => refreshRuns(true));
    $("saveConfig").addEventListener("click", saveConfig);
    $("checkCPA").addEventListener("click", async () => {
      $("saveState").textContent = "正在检测 CPA（使用当前表单值，不写入磁盘）...";
      $("saveState").className = "save-state";
      try {
        const result = await api("/api/check/cpa", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            CPA_MANAGEMENT_BASE: fieldValue("CPA_MANAGEMENT_BASE"),
            CPA_MANAGEMENT_KEY: fieldValue("CPA_MANAGEMENT_KEY")
          })
        });
        $("saveState").textContent = result.ok ? `CPA 检测通过，HTTP ${result.status}` : `CPA 检测失败：${result.error || ("HTTP " + result.status)}`;
        $("saveState").className = "save-state" + (result.ok ? "" : " error");
      } catch (error) {
        $("saveState").textContent = "CPA 检测失败：" + error.message;
        $("saveState").className = "save-state error";
      }
    });
    $("controlForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!event.currentTarget.reportValidity()) return;
      if (isConfigDirty()) {
        const ok = window.confirm("配置有未保存更改。启动将使用磁盘上已保存的配置，而不是当前表单。仍要启动吗？");
        if (!ok) return;
      }
      setRunMessage("正在启动任务...");
      $("startButton").disabled = true;
      try {
        await api("/api/start", { method: "POST", headers: {"Content-Type":"application/x-www-form-urlencoded"}, body: new URLSearchParams({ target: $("targetInput").value, thread: $("threadInput").value }) });
        setRunMessage("任务已启动");
        state.logsPrimed = false;
        state.logSize = 0;
        state.logMtime = 0;
        await Promise.allSettled([refreshStatus(), refreshLogs(true), refreshRuns(true)]);
      } catch (error) {
        setRunMessage(error.message, true);
        $("startButton").disabled = state.status === "running";
      }
    });
    $("stopButton").addEventListener("click", async () => {
      setRunMessage("正在停止任务...");
      $("stopButton").disabled = true;
      try {
        await api("/api/stop", { method: "POST" });
        setRunMessage("任务已停止");
        await Promise.allSettled([refreshStatus(), refreshLogs(true), refreshRuns(true)]);
      } catch (error) {
        setRunMessage(error.message, true);
        $("stopButton").disabled = state.status !== "running";
      }
    });
    window.addEventListener("beforeunload", (event) => {
      if (isConfigDirty()) { event.preventDefault(); event.returnValue = ""; }
    });
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        if (state.pollTimer) { window.clearInterval(state.pollTimer); state.pollTimer = 0; }
        return;
      }
      updatePolling();
      refreshVisible();
    });
    Promise.allSettled([loadConfig(), refreshStatus(), refreshLogs(true), refreshRuns(true)]).then(() => updatePolling());
  </script>
</body>
</html>
