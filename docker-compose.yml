services:
  grok-register:
    build:
      context: .
      args:
        GO_VERSION: ${GO_VERSION:-1.26.5}
    image: grok-register:local
    container_name: grok-register
    restart: unless-stopped
    depends_on:
      privoxy:
        condition: service_healthy
      flaresolverr:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GROK_HOME: /data/grok
      GROK_TARGET: ${GROK_TARGET:-10}
      EMAIL_MODE: ${EMAIL_MODE:-tempmail}
      EMAIL_DOMAIN: ${EMAIL_DOMAIN:-}
      EMAIL_API: ${EMAIL_API:-http://127.0.0.1:8080}
      TESTMAIL_API_KEY: ${TESTMAIL_API_KEY:-}
      TESTMAIL_NAMESPACE: ${TESTMAIL_NAMESPACE:-}
      TESTMAIL_DOMAIN: ${TESTMAIL_DOMAIN:-inbox.testmail.app}
      CLEARANCE_ENABLED: ${CLEARANCE_ENABLED:-1}
      CLEARANCE_MODE: ${CLEARANCE_MODE:-auto}
      CLEARANCE_AUTO_STOP: ${CLEARANCE_AUTO_STOP:-0}
      CF_IMPERSONATE: ${CF_IMPERSONATE:-chrome_131}
      CF_IMPERSONATE_FALLBACK: ${CF_IMPERSONATE_FALLBACK:-chrome_124,chrome_120}
      REGISTER_PROXY: ${REGISTER_PROXY:-http://privoxy:8118}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-http://flaresolverr:8191}
      CLEARANCE_PROXY: ${CLEARANCE_PROXY:-http://privoxy:8118}
      CLEARANCE_URLS: ${CLEARANCE_URLS:-https://accounts.x.ai,https://x.ai,https://status.x.ai,https://console.x.ai,https://auth.x.ai}
      TURNSTILE_PROVIDER: ${TURNSTILE_PROVIDER:-browser}
      TURNSTILE_MODE: ${TURNSTILE_MODE:-offscreen}
      LITE_SOLVER_URL: ${LITE_SOLVER_URL:-http://127.0.0.1:5072}
      PROTOCOL_HTTP: ${PROTOCOL_HTTP:-1}
      HTTP_POOL_SIZE: ${HTTP_POOL_SIZE:-8}
      TEMPMAIL_LOL_RETRIES: ${TEMPMAIL_LOL_RETRIES:-30}
      TEMPMAIL_LOL_MIN_INTERVAL_MS: ${TEMPMAIL_LOL_MIN_INTERVAL_MS:-1500}
      OAUTH_MIN_INTERVAL_SEC: ${OAUTH_MIN_INTERVAL_SEC:-6}
      OAUTH_RETRY_SEC: ${OAUTH_RETRY_SEC:-60}
      HTTPS_PROXY: ${HTTPS_PROXY:-http://privoxy:8118}
      HTTP_PROXY: ${HTTP_PROXY:-http://privoxy:8118}
      NO_PROXY: ${NO_PROXY:-127.0.0.1,localhost,privoxy,flaresolverr,warp-proxy}
      OUTPUT_SSO_ENABLED: ${OUTPUT_SSO_ENABLED:-1}
      OUTPUT_GROK2API_SSO_ENABLED: ${OUTPUT_GROK2API_SSO_ENABLED:-1}
      OUTPUT_CPA_ENABLED: ${OUTPUT_CPA_ENABLED:-1}
      PHYSICAL_CAP: ${PHYSICAL_CAP:-0}
      TURNSTILE_WORKERS: ${TURNSTILE_WORKERS:-2}
      CPA_UPLOAD_ENABLED: ${CPA_UPLOAD_ENABLED:-0}
      CPA_MANAGEMENT_BASE: ${CPA_MANAGEMENT_BASE:-http://host.docker.internal:8317/v0/management}
      CPA_MANAGEMENT_KEY: ${CPA_MANAGEMENT_KEY:-}
      CPA_UPLOAD_TIMEOUT_SEC: ${CPA_UPLOAD_TIMEOUT_SEC:-30}
      CPA_UPLOAD_RETRIES: ${CPA_UPLOAD_RETRIES:-2}
      CPA_UPLOAD_NAME_TEMPLATE: ${CPA_UPLOAD_NAME_TEMPLATE:-}
      CPA_UPLOAD_VERIFY: ${CPA_UPLOAD_VERIFY:-1}
      CPA_UPLOAD_MODE: ${CPA_UPLOAD_MODE:-multipart}
      WEB_ENABLED: ${WEB_ENABLED:-1}
      WEB_ADDR: :8090
      WEB_USERNAME: ${WEB_USERNAME:-admin}
      WEB_PASSWORD: ${WEB_PASSWORD:?WEB_PASSWORD is required. Set it in .env}
      GROK_BIN: /usr/local/bin/grok
    volumes:
      - ./data/grok:/data/grok
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${WEB_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$${WEB_ENABLED:-1}\" = \"1\" ]; then curl -fsS -u \"$${WEB_USERNAME}:$${WEB_PASSWORD}\" http://127.0.0.1:8090/api/status >/dev/null; else grok status >/dev/null; fi"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  warp-proxy:
    image: caomingjun/warp:latest
    container_name: grok-clearance-warp
    restart: unless-stopped
    environment:
      WARP_SLEEP: "2"
      WARP_LICENSE_KEY: ${WARP_LICENSE_KEY:-}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 0
      net.ipv4.conf.all.src_valid_mark: 1
    # No host ports: WARP is only used via privoxy on the compose network.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('127.0.0.1', 1080), 5); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  privoxy:
    image: vimagick/privoxy:latest
    container_name: grok-clearance-privoxy
    restart: unless-stopped
    depends_on:
      warp-proxy:
        condition: service_started
    volumes:
      - ./clearance/privoxy-warp.conf:/etc/privoxy/config:ro
    # No host ports: app reaches privoxy at http://privoxy:8118 on the compose network.
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8118 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: grok-clearance-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
      TZ: ${TZ:-Asia/Shanghai}
    # No host ports: app reaches FlareSolverr at http://flaresolverr:8191 on the compose network.
    depends_on:
      privoxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8191/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
